name: ShellCheck

on:
  push:
    branches:
      - main
    paths:
      - "install.sh"
      - ".github/workflows/shellcheck.yml"
  pull_request:
    branches:
      - main
    paths:
      - "install.sh"
      - ".github/workflows/shellcheck.yml"

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # shellcheck は ubuntu-latest ランナーにプリインストールされている
      - name: Run shellcheck
        run: shellcheck install.sh
