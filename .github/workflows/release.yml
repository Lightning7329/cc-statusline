name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet test

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - rid: linux-x64
            os: linux
            arch: x64
          - rid: linux-arm64
            os: linux
            arch: arm64
          - rid: osx-x64
            os: osx
            arch: x64
          - rid: osx-arm64
            os: osx
            arch: arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Publish
        run: >-
          dotnet publish src/StatusLine
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -p:Version=${{ steps.version.outputs.version }}
      - name: Package tarball
        run: >-
          tar -czf statusline-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
          -C src/StatusLine/bin/Release/net10.0/${{ matrix.rid }}/publish
          statusline
      - uses: actions/upload-artifact@v7
        with:
          name: statusline-${{ matrix.os }}-${{ matrix.arch }}
          path: statusline-${{ matrix.os }}-${{ matrix.arch }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: >-
          gh release create "$TAG"
          statusline-*.tar.gz
          --repo "$GITHUB_REPOSITORY"
          --title "$TAG"
          --generate-notes
