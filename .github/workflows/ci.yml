name: CI

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "StatusLine.slnx"
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "StatusLine.slnx"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - run: dotnet test
